name: Daily Stock Report

on:
  schedule:
    # 아침 브리핑: KST 06:00 = UTC 21:00 (전날)
    - cron: '0 21 * * 0-4'
    # 마감 리포트: KST 15:35 = UTC 06:35
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to run'
        required: true
        default: 'both'
        type: choice
        options:
          - morning
          - closing
          - both

jobs:
  morning-report:
    if: >
      github.event.schedule == '0 21 * * 0-4' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.report_type == 'morning' || github.event.inputs.report_type == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run morning pipeline
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_HTS_ID: ${{ secrets.KIS_HTS_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd python
          python main_morning.py

  closing-report:
    if: >
      github.event.schedule == '35 6 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.report_type == 'closing' || github.event.inputs.report_type == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run closing pipeline
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_HTS_ID: ${{ secrets.KIS_HTS_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd python
          python main_closing.py
