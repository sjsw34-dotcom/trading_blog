name: Daily Stock Report

on:
  # schedule 비활성화 — API 비용 절감 (2026-04-06)
  # schedule:
  #   # 아침 브리핑: KST 07:30 = UTC 22:30 (전날), 일~목 → 월~금 아침
  #   - cron: '30 22 * * 0-4'
  #   # 마감 리포트: KST 17:00 = UTC 08:00, 월~금
  #   - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to run'
        required: true
        default: 'both'
        type: choice
        options:
          - morning
          - closing
          - both

jobs:
  morning-report:
    if: >
      github.event.schedule == '30 22 * * 0-4' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.report_type == 'morning' || github.event.inputs.report_type == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run morning pipeline
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_HTS_ID: ${{ secrets.KIS_HTS_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TRADING_NEON_DATABASE_URL: ${{ secrets.TRADING_NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd python
          python main_morning.py

  closing-report:
    if: >
      github.event.schedule == '0 8 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.report_type == 'closing' || github.event.inputs.report_type == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run closing pipeline
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_HTS_ID: ${{ secrets.KIS_HTS_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TRADING_NEON_DATABASE_URL: ${{ secrets.TRADING_NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd python
          python main_closing.py
